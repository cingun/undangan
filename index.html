<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Anang & Anik</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

/* COVER */
.cover{
  height:100vh;
  position:relative;
  background:url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  overflow:hidden;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  backdrop-filter:blur(12px);
  background:rgba(0,0,30,0.6);
  transition:1.2s;
}

.cover.hide .overlay{
  backdrop-filter:blur(0);
  opacity:0;
}

.cover.hide{
  transform:scale(1.25);
  opacity:0;
  transition:1.5s cubic-bezier(0.22,1,0.36,1);
}

.cover h1{
  font-family:'Great Vibes';
  font-size:60px;
  z-index:2;
  text-shadow:0 0 20px gold;
}

/* FLOWER */
.flower{
  position:absolute;
  width:180px;
  opacity:0.8;
}
.top{top:0;left:0;}
.bottom{bottom:0;right:0;}

/* BUTTON */
.btn{
  margin-top:20px;
  background:linear-gradient(45deg,#d4af37,#f6e27a);
  padding:12px 30px;
  border-radius:30px;
  border:none;
  font-weight:bold;
}

/* SPARKLE */
.sparkle{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  animation:blink 2s infinite;
}
@keyframes blink{
  0%,100%{opacity:0;}
  50%{opacity:1;}
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(80px) scale(0.95);
  transition:1s cubic-bezier(0.22,1,0.36,1);
}
.section.show{
  opacity:1;
  transform:translateY(0) scale(1);
}

.gold{
  color:#f6e27a;
  font-family:'Playfair Display';
  text-shadow:0 0 10px rgba(255,215,0,0.6);
}

/* GALLERY */
.gallery{
  display:flex;
  overflow-x:auto;
}
.gallery img{
  width:70%;
  margin:10px;
  border-radius:20px;
  cursor:pointer;
}

/* VIEWER */
.viewer{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.viewer img{
  width:90%;
  max-width:600px;
  border-radius:20px;
  transition:0.4s;
}

/* MUSIC */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:gold;
  padding:15px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover">
  <div class="overlay"></div>

  <img class="flower top" src="https://png.pngtree.com/png-clipart/20221026/original/pngtree-blue-floral-watercolor-png-image_8720822.png">
  <img class="flower bottom" src="https://png.pngtree.com/png-clipart/20221026/original/pngtree-blue-floral-watercolor-png-image_8720822.png">

  <h1>Anang & Anik</h1>
  <p id="guest"></p>
  <button class="btn" onclick="openInv()">Open Invitation</button>
</div>

<div id="main" style="display:none">

<div class="section">
  <h2 class="gold">The Wedding</h2>
  <p>3 Oktober 2026</p>
</div>

<div class="section">
  <h2 class="gold">Galeri</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1502767089025-6572583495b0" onclick="openViewer(0)">
    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330" onclick="openViewer(1)">
  </div>
</div>

</div>

<!-- VIEWER -->
<div class="viewer" id="viewer">
  <img id="viewerImg">
</div>

<audio id="audio" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>
<div class="music" onclick="toggle()">🎵</div>

<script>
const images=[
"https://images.unsplash.com/photo-1502767089025-6572583495b0",
"https://images.unsplash.com/photo-1494790108377-be9c29b29330"
];

let current=0;

// guest
guest.innerText=new URLSearchParams(location.search).get('to')||'Tamu';

// open cinematic
function openInv(){
  cover.classList.add("hide");
  setTimeout(()=>{
    cover.style.display="none";
    main.style.display="block";
    audio.play();
    reveal();
    sparkle();
    autoSlide();
  },1200);
}

// reveal
function reveal(){
  document.querySelectorAll(".section").forEach((el,i)=>{
    if(el.getBoundingClientRect().top<window.innerHeight-100){
      setTimeout(()=>el.classList.add("show"),i*150);
    }
  });
}
window.addEventListener("scroll",reveal);

// PARALLAX
document.addEventListener("mousemove",e=>{
  document.querySelectorAll(".flower").forEach(el=>{
    let speed=0.04;
    let x=(window.innerWidth/2-e.pageX)*speed;
    let y=(window.innerHeight/2-e.pageY)*speed;
    el.style.transform=`translate(${x}px,${y}px)`;
  });
});

// VIEWER
function openViewer(i){
  current=i;
  viewer.style.display="flex";
  viewerImg.src=images[current];
}

// swipe
let startX=0;
viewer.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});
viewer.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50) next();
  else if(endX-startX>50) prev();
});

function next(){
  current=(current+1)%images.length;
  viewerImg.src=images[current];
}
function prev(){
  current=(current-1+images.length)%images.length;
  viewerImg.src=images[current];
}

viewer.onclick=()=>viewer.style.display="none";

// sparkle
function sparkle(){
  for(let i=0;i<40;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.top=Math.random()*100+"%";
    s.style.left=Math.random()*100+"%";
    s.style.animationDelay=Math.random()*2+"s";
    document.body.appendChild(s);
  }
}

// auto slide
function autoSlide(){
  setInterval(()=>{
    next();
  },4000);
}

// music
function toggle(){
  audio.paused?audio.play():audio.pause();
}
</script>

</body>
</html>
