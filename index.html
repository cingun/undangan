<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Undangan Digital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

  <style>
    .envelope {
  position: relative;
  width: 250px;
  height: 150px;
  background: #eaeaea;
  cursor: pointer;
  margin: auto;
  border-radius: 10px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #d6d6d6;
  clip-path: polygon(0 0, 100% 0, 50% 50%);
  transition: 0.5s;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.letter {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  text-align: center;
  padding-top: 20px;
}
    
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #fdfbfb, #ebedee);
      text-align: center;
    }

    .cover {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .btn {
      padding: 12px 25px;
      background: black;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }

    .container {
      padding: 30px;
      max-width: 500px;
      margin: auto;
    }

    h1 {
      font-family: 'Playfair Display', serif;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    .countdown {
      font-size: 20px;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div id="musicControl" onclick="toggleMusic()" style="
position: fixed;
bottom: 20px;
right: 20px;
background: black;
color: white;
padding: 12px 15px;
border-radius: 50%;
cursor: pointer;
font-size: 18px;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
">
🔊
</div>

<!-- COVER -->
<div class="cover" id="cover">
  <div class="envelope" onclick="bukaUndangan()">
    <div class="flap"></div>
    <div class="letter">
      <h3>Kepada Yth:</h3>
      <h2 id="namaTamu">Tamu Undangan</h2>
      <p>Klik untuk membuka</p>
    </div>
  </div>
</div>

<!-- ISI -->  
<div class="container hidden" id="isi">
  <h1>Wedding Anik & Anang</h1>
  <p>3 Oktober 2026</p>
  <p>Blora</p>

  <!-- Countdown -->
  <div class="countdown" id="countdown"></div>

  <!-- Maps -->
  <div class="card">
    <p>Lokasi Acara</p>
    <iframe 
      src="https://maps.google.com/maps?q=blora&t=&z=13&ie=UTF8&iwloc=&output=embed"
      width="100%" height="200" style="border:0;">
    </iframe>
  </div>
</div>

<!-- Musik -->
<audio id="musik" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
  
let isPlaying = false;

function toggleMusic() {
  const musik = document.getElementById("musik");
  const btn = document.getElementById("musicControl");

  if (isPlaying) {
    musik.pause();
    btn.innerHTML = "🔇";
  } else {
    musik.play();
    btn.innerHTML = "🔊";
  }

  isPlaying = !isPlaying;
}

// Auto play saat buka undangan
<script>
function bukaUndangan() {
  document.querySelector(".envelope").classList.add("open");

  setTimeout(() => {
    document.getElementById("cover").classList.add("hidden");
    document.getElementById("isi").classList.remove("hidden");
  }, 500);

  const musik = document.getElementById("musik");
  musik.volume = 0;
  musik.play();

  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      musik.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
}
</script>

  <script>
  
  // Ambil nama dari URL
  const urlParams = new URLSearchParams(window.location.search);
  const nama = urlParams.get('to');
  if (nama) {
    document.getElementById("namaTamu").innerText = nama;
  }

  // Buka undangan

function bukaUndangan() {
  document.getElementById("cover").classList.add("hidden");
  document.getElementById("isi").classList.remove("hidden");

  const musik = document.getElementById("musik");
  musik.muted = false;
  musik.play().catch(() => {
    console.log("Autoplay diblok, tapi normal kok");
  });
}

  // Countdown
  <script>
const targetDate = new Date("Oct 3, 2026 00:00:00").getTime();

const countdown = setInterval(function() {
  const now = new Date().getTime();
  const distance = targetDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "Acara sedang berlangsung 🎉";
    clearInterval(countdown);
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((distance / (1000 * 60)) % 60);
  const seconds = Math.floor((distance / 1000) % 60);

  document.getElementById("countdown").innerHTML =
    `${days} Hari ${hours} Jam ${minutes} Menit ${seconds} Detik`;
}, 1000);
</script>

</body>
</html>
