<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Undangan Digital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #fdfbfb, #ebedee);
      text-align: center;
    }

    .cover {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .btn {
      padding: 12px 25px;
      background: black;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }

    .container {
      padding: 30px;
      max-width: 500px;
      margin: auto;
    }

    h1 {
      font-family: 'Playfair Display', serif;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    .countdown {
      font-size: 20px;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover">
  <h2>Undangan Pernikahan</h2>
  <h1>Anik & Anang</h1>
  <p>Kepada Yth:</p>
  <h3 id="namaTamu">Tamu Undangan</h3>

  <div class="btn" onclick="bukaUndangan()">Buka Undangan</div>
</div>

<!-- ISI -->
<div class="container hidden" id="isi">
  <h1>Wedding Anik & Anang</h1>
  <p>3 Oktober 2026</p>
  <p>Blora</p>

  <!-- Countdown -->
  <div class="countdown" id="countdown"></div>

  <!-- Maps -->
  <div class="card">
    <p>Lokasi Acara</p>
    <iframe 
      src="https://maps.google.com/maps?q=blora&t=&z=13&ie=UTF8&iwloc=&output=embed"
      width="100%" height="200" style="border:0;">
    </iframe>
  </div>
</div>

<!-- Musik -->
<audio id="musik" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
  // Ambil nama dari URL
  const urlParams = new URLSearchParams(window.location.search);
  const nama = urlParams.get('to');
  if (nama) {
    document.getElementById("namaTamu").innerText = nama;
  }

  // Buka undangan

function bukaUndangan() {
  document.getElementById("cover").classList.add("hidden");
  document.getElementById("isi").classList.remove("hidden");

  const musik = document.getElementById("musik");
  musik.muted = false;
  musik.play().catch(() => {
    console.log("Autoplay diblok, tapi normal kok");
  });
}

  // Countdown
  const targetDate = new Date("Oct 3, 2026 00:00:00").getTime();

  const x = setInterval(function() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    document.getElementById("countdown").innerHTML =
      "Menuju hari bahagia: " + days + " hari lagi";

  }, 1000);
</script>

</body>
</html>
